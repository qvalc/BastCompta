<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devis & Facture</title>
  <style>
    :root {
      --bg: #edf1f5;
      --paper: #ffffff;
      --ink: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --line-strong: #9ca3af;
      --head: #f3f4f6;
      --primary: #1d4ed8;
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 13px;
    }

    .app {
      max-width: 1450px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .title-wrap h1 {
      margin: 0 0 4px;
      font-size: 26px;
    }

    .title-wrap p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button,
    .file-label {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      border-radius: 8px;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    button.danger {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    .file-label input {
      display: none;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 9px 13px;
      cursor: pointer;
      font-weight: 700;
      border-radius: 8px;
    }

    .tab.active {
      background: #eaf1ff;
      border-color: #b9cdfc;
      color: var(--primary);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .toolbar .hint {
      font-size: 13px;
      color: var(--muted);
    }

    .inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sheet {
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 22px 22px 18px;
    }

    .doc-head {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: start;
      margin-bottom: 10px;
    }

    .doc-head-right {
      display: flex;
      flex-direction: column;
    }

    .doc-title-top {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin: 0 0 14px;
      text-align: left;
    }

    .seller {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 54px;
    }

    .seller-text {
      min-width: 0;
    }

    .seller h2 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
    }

    .seller-lines {
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-line;
    }

    .company-logo-wrap {
      margin: 6px 0 0 16px;
      flex-shrink: 0;
    }

    .company-logo {
      max-width: 115px;
      max-height: 115px;
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
    }


    .client-box {
      border: 1px solid var(--line);
      padding: 10px;
      margin-top: 0;
    }

    .client-box .stack {
      flex: 1;
    }

    .box-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 18px 0 8px;
      text-align: left;
    }

    .meta-table-wrap {
      margin-bottom: 14px;
      border: 1px solid var(--line);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    .meta-table th,
    .meta-table td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 8px 9px;
      vertical-align: middle;
      font-size: 12px;
    }

    .meta-table th:last-child,
    .meta-table td:last-child {
      border-right: none;
    }

    .meta-table tr:last-child td {
      border-bottom: none;
    }

    .meta-table th {
      background: var(--head);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
      text-align: left;
      font-weight: 700;
    }

    .doc-table-wrap {
      border: 1px solid var(--line);
      overflow: auto;
      margin-bottom: 14px;
    }

    .doc-table {
      min-width: 980px;
      table-layout: fixed;
      width: 100%;
    }

    .doc-table th,
    .doc-table td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 7px 7px;
      font-size: 12px;
      vertical-align: middle;
    }

    .doc-table th:last-child,
    .doc-table td:last-child {
      border-right: none;
    }

    .doc-table th {
      background: var(--head);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
      text-align: left;
      font-weight: 700;
    }

    .doc-table td:nth-child(2),
    .doc-table td:nth-child(3),
    .doc-table td:nth-child(4),
    .doc-table td:nth-child(5),
    .doc-table td:nth-child(6),
    .doc-table td:nth-child(7),
    .doc-table th:nth-child(2),
    .doc-table th:nth-child(3),
    .doc-table th:nth-child(4),
    .doc-table th:nth-child(5),
    .doc-table th:nth-child(6),
    .doc-table th:nth-child(7) {
      text-align: center;
    }

    .doc-table th:first-child,
    .doc-table td:first-child {
      width: 44%;
    }

    .doc-table th:nth-child(2),
    .doc-table td:nth-child(2) {
      width: 95px;
      /* Quantité */
    }

    .doc-table th:nth-child(3),
    .doc-table td:nth-child(3) {
      width: 70px;
      /* Unité */
    }

    .doc-table th:nth-child(4),
    .doc-table td:nth-child(4) {
      width: 95px;
      /* Pr. unit. */
    }

    .doc-table th:nth-child(5),
    .doc-table td:nth-child(5) {
      width: 85px;
      /* Remise */
    }

    .doc-table th:nth-child(6),
    .doc-table td:nth-child(6) {
      width: 105px;
      /* Total */
    }

    .doc-table th:nth-child(7),
    .doc-table td:nth-child(7) {
      width: 85px;
      /* TVA */
    }

    .doc-table th:last-child,
    .doc-table td:last-child {
      width: 95px;
      /* bouton */
    }

    .doc-table td:first-child textarea,
    .doc-table th:first-child {
      width: 100%;
    }

    .doc-table td:first-child textarea {
      min-height: 22px;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
      line-height: 1.25;
      padding-top: 4px;
      padding-bottom: 4px;
    }

    .doc-table td input,
    .doc-table td select,
    .doc-table td textarea {
      max-width: 100%;
      box-sizing: border-box;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #d6dbe3;
      background: #fff;
      padding: 7px 8px;
      font: inherit;
      font-size: 12px;
      border-radius: 0;
    }

    textarea {
      min-height: 28px;
      resize: none;
      overflow: hidden;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr 330px;
      gap: 20px;
      align-items: start;
      margin-top: 8px;
    }

    .notes-block {
      border: 1px solid var(--line);
      padding: 10px;
      min-height: 40px;
    }

    .totals {
      width: 100%;
      border: 1px solid var(--line);
    }

    .totals .row {
      display: grid;
      grid-template-columns: 1fr 120px;
      border-bottom: 1px solid var(--line);
    }

    .totals .row:last-child {
      border-bottom: none;
    }

    .totals .row div {
      padding: 8px 10px;
      font-size: 12px;
    }

    .totals .row div:last-child {
      text-align: right;
      border-left: 1px solid var(--line);
      font-weight: 700;
    }

    .totals .final {
      background: #f7fafc;
      font-weight: 700;
    }

    .pay-block {
      margin-top: 12px;
      border: 1px solid var(--line);
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
    }

    .pay-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 4px;
    }

    .conditions-screen {
      margin-top: 18px;
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 22px;
    }

    .conditions-screen h3,
    .conditions-print-page h3 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .conditions-content {
      white-space: pre-line;
      line-height: 1.6;
      font-size: 12px;
    }

    .comm-panel {
      background: #fff;
      border: 1px solid var(--line);
      padding: 20px;
    }

    .comm-panel h2 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .comm-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 180px;
      gap: 12px;
      align-items: end;
      margin-bottom: 18px;
    }

    .comm-result {
      border: 1px solid var(--line-strong);
      background: #fafafa;
      padding: 16px;
      font-size: 30px;
      font-weight: 700;
      text-align: center;
      letter-spacing: .03em;
      word-break: break-word;
    }

    .comm-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .simple-box {
      border: 1px solid var(--line);
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      background: #fff;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 16px;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .toggle-row label {
      font-size: 14px;
      font-weight: 700;
    }

    .check-inline {
      width: auto;
      transform: scale(1.1);
    }

    .conditions-print-page {
      display: none;
    }

    @media (max-width: 1100px) {

      .doc-head,
      .bottom,
      .comm-grid,
      .comm-meta,
      .settings-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .app {
        padding: 12px;
      }

      .sheet,
      .comm-panel,
      .conditions-screen {
        padding: 14px;
      }

      .doc-title-top {
        font-size: 26px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .doc-title-top {
        font-size: 28px !important;
        margin: 0 0 10px !important;
      }

      .doc-table td:first-child textarea {
        white-space: pre-wrap !important;
        overflow-wrap: break-word !important;
        word-break: break-word !important;
        height: auto !important;
        min-height: 18px !important;
        line-height: 1.25 !important;
      }

      .doc-table th,
      .doc-table td {
        font-size: 11px !important;
        padding: 7px 7px !important;
      }

      .topbar,
      .tabs,
      .toolbar,
      .no-print,
      .conditions-screen {
        display: none !important;
      }

      .app {
        max-width: none;
        padding: 0;
      }

      .page {
        display: none !important;
      }

      .page.print-include {
        display: block !important;
      }

      .sheet,
      .comm-panel,
      .conditions-print-page {
        border: none;
        box-shadow: none;
        padding: 0;
        background: #fff;
      }

      .doc-head {
        grid-template-columns: 1fr 1fr !important;
        gap: 18px !important;
        align-items: start !important;
      }

      .bottom {
        grid-template-columns: 1fr 280px !important;
        gap: 12px !important;
        align-items: start !important;
      }

      .client-box {
        min-height: auto !important;
        padding: 8px !important;
      }

      .client-box textarea {
        min-height: 52px !important;
      }

      .notes-block {
        min-height: 0 !important;
        height: auto !important;
        padding: 6px 8px !important;
      }

      .totals,
      .pay-block {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      .notes-block textarea {
        min-height: 0 !important;
        height: auto !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      input,
      textarea,
      select {
        border: none;
        padding: 0;
        background: transparent;
      }

      .doc-table-wrap {
        overflow: visible;
      }

      .doc-table {
        min-width: 0;
      }

      .company-logo {
        max-width: 85px;
        max-height: 85px;
      }

      .conditions-print-page {
        display: block !important;
        page-break-before: always;
        break-before: page;
      }

      .conditions-content {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Devis & Facture</h1>
      </div>
      <div class="actions">
        <button class="primary" onclick="saveData()">Sauvegarder</button>
        <button onclick="exportData()">Exporter JSON</button>
        <button onclick="printCurrentPage()">Imprimer l’onglet</button>
        <button onclick="importData()">Importer JSON</button>
        <button class="danger" onclick="resetData()">Réinitialiser</button>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="pages"></div>
    <input id="localJsonToDriveInput" type="file" accept="application/json" style="display:none"
      onchange="uploadLocalJsonToDrive(event)">
  </div>

  <script src="https://apis.google.com/js/api.js"></script>

  <script>
    const STORAGE_KEY = 'devis-facture-style-vrai-document';

    let googleAccessToken = null;
    let googleDriveFiles = [];
    let selectedDriveFileId = '';

    const defaultLines = () => ([
      {
        description: '',
        qty: 1,
        unit: 'p',
        unitPrice: 0,
        discount: 0,
        vatRate: 21
      }
    ]);

    const defaultData = {
      company: {
        name: '',
        address: '',
        city: '',
        phone: '',
        email: '',
        website: '',
        vat: '',
        iban: '',
        bic: '',
        conditions: '',
        logo: ''
      },
      quote: {
        documentNumber: '',
        clientNumber: '',
        clientVat: '',
        clientName: '',
        address: '',
        date: '',
        validity: '',
        siteName: '',
        lines: defaultLines(),
        suppliesEnabled: false,
        suppliesLines: defaultLines(),
        notes: ''
      },
      invoice: {
        documentNumber: '',
        clientNumber: '',
        clientVat: '',
        clientName: '',
        address: '',
        date: '',
        dueDate: '',
        siteName: '',
        paidAmount: 0,
        lines: defaultLines(),
        suppliesEnabled: false,
        suppliesLines: defaultLines(),
        notes: ''
      },
      communication: {
        clientNumber: '',
        invoiceYear: '',
        invoiceNumber: '',
        controlNumber: '',
        formatted: ''
      }
    };

    const pageDefs = [
      { key: 'quote', label: 'Devis' },
      { key: 'invoice', label: 'Facture' },
      { key: 'communication', label: 'Communication structurée' },
      { key: 'peppol', label: 'Peppol / Doccle' },
      { key: 'gdrive', label: 'Google Drive' },
      { key: 'settings', label: 'Paramètres' }
    ];

    let data = loadData();
    let activePage = 'quote';

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(defaultData);
        return mergeDeep(structuredClone(defaultData), JSON.parse(raw));
      } catch {
        return structuredClone(defaultData);
      }
    }

    function mergeDeep(target, source) {
      for (const key in source) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
          target[key] = mergeDeep(target[key] || {}, source[key]);
        } else {
          target[key] = source[key];
        }
      }
      return target;
    }

    function saveData(showAlert = true) {
      syncCommunicationFromInvoice(false);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      if (showAlert) alert('Données sauvegardées localement.');
      render();
    }

    function exportData() {
      exportJsonToDrive();
    }

    function importData() {
      importJsonFromDrive();
    }

    function renderGoogleDrive() {
      const options = googleDriveFiles.map(file => `
    <option value="${escapeAttr(file.id)}" ${selectedDriveFileId === file.id ? 'selected' : ''}>
      ${escapeHtml(file.name)}${file.modifiedTime ? ' — ' + new Date(file.modifiedTime).toLocaleString('fr-BE') : ''}
    </option>
  `).join('');

      return `
    <section class="page ${activePage === 'gdrive' ? 'active' : ''}" data-page="gdrive">
      <div class="sheet">
        <div class="toolbar no-print">
          <div class="hint">Sauvegarde et restauration avec Google Drive</div>
          <div class="inline-actions">
  <button onclick="loadDriveFiles()">Actualiser la liste</button>
  <button onclick="pickLocalJsonForDrive()">Envoyer un JSON local vers Drive</button>
  <button class="primary" onclick="exportJsonToDrive()">Exporter JSON vers Drive</button>
</div>
        </div>

        <div class="comm-panel">
          <h2>Google Drive</h2>

          <div class="simple-box" style="margin-bottom:16px;">
  La connexion Google Drive se fait depuis le portail principal BastCompta.
</div>

          <div class="simple-box" style="margin-bottom:16px;">
            Les sauvegardes sont créées sous forme de fichiers séparés, par exemple :
            <br>• devis-DEV-001.json
            <br>• facture-FA-2026-001.json
          </div>

          <div class="simple-box" style="margin-bottom:16px;">
            <strong>Nom qui sera utilisé pour le prochain export :</strong><br>
            ${escapeHtml(getDriveFileName())}
          </div>

          <div class="simple-box" style="margin-bottom:16px;">
  <label style="display:block; margin-bottom:8px; font-weight:700;">Sauvegarde à charger</label>
  <select onchange="selectedDriveFileId=this.value; render()">
    <option value="">-- Sélectionner une sauvegarde --</option>
    ${options}
  </select>

  <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
    <button onclick="importSelectedJsonFromDrive()">Charger</button>
    <button class="danger" onclick="deleteSelectedJsonFromDrive()">Supprimer</button>
  </div>
</div>

<div class="simple-box" style="line-height:1.7;">
  <strong>Conseil</strong><br>
  Donne toujours un numéro de devis ou de facture avant d’exporter.<br>
  Même numéro = mise à jour du même fichier.<br>
  Nouveau numéro = nouveau fichier JSON.
</div>
        </div>
      </div>
    </section>
  `;
    }

    function getDriveFileName() {
      const quoteNumber = String(data.quote.documentNumber || '').trim();
      const invoiceNumber = String(data.invoice.documentNumber || '').trim();

      if (invoiceNumber) {
        return `facture-${invoiceNumber}.json`;
      }

      if (quoteNumber) {
        return `devis-${quoteNumber}.json`;
      }

      return 'devis-facture-sans-numero.json';
    }

    async function loadDriveFiles() {
      if (!googleAccessToken) {
        alert("Connecte Google Drive depuis le portail BastCompta.");
        return;
      }

      try {
        const list = await gapi.client.drive.files.list({
          spaces: 'appDataFolder',
          q: `mimeType='application/json' and trashed=false and (name contains 'devis-' or name contains 'facture-')`,
          orderBy: 'modifiedTime desc',
          pageSize: 100,
          fields: 'files(id, name, modifiedTime)'
        });

        googleDriveFiles = list.result.files || [];

        if (!selectedDriveFileId && googleDriveFiles.length) {
          selectedDriveFileId = googleDriveFiles[0].id;
        }

        render();

      } catch (error) {
        console.error(error);

        alert("Impossible de charger la liste des sauvegardes Drive. Vérifie la connexion Google Drive dans le portail.");
      }
    }

    async function importSelectedJsonFromDrive() {
      if (!googleAccessToken) {
        alert("Connecte Google Drive depuis le portail BastCompta.");
        return;
      }

      if (!selectedDriveFileId) {
        alert('Sélectionne d’abord une sauvegarde Google Drive.');
        return;
      }

      try {
        const file = googleDriveFiles.find(f => f.id === selectedDriveFileId);

        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${selectedDriveFileId}?alt=media`, {
          headers: {
            Authorization: `Bearer ${googleAccessToken}`
          }
        });

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const parsed = await res.json();
        data = mergeDeep(structuredClone(defaultData), parsed);
        syncCommunicationFromInvoice(false);
        saveData(false);
        alert(`Import réussi : ${file ? file.name : 'fichier sélectionné'}`);
      } catch (error) {
        console.error(error);
        alert("Échec de l'import depuis Google Drive.");
      }
    }

    async function deleteSelectedJsonFromDrive() {
      if (!googleAccessToken) {
        alert("Connecte Google Drive depuis le portail BastCompta.");
        return;
      }

      if (!selectedDriveFileId) {
        alert('Sélectionne une sauvegarde à supprimer.');
        return;
      }

      if (!confirm('Supprimer cette sauvegarde définitivement ?')) return;

      try {

    async function uploadLocalJsonToDrive(event) {
      if (!googleAccessToken) {
        alert("Connecte Google Drive depuis le portail BastCompta.");
        return;
      }

      const file = event.target.files?.[0];
      if (!file) return;

      try {
        const content = await file.text();

        let parsed;
        try {
          parsed = JSON.parse(content);
        } catch {
          alert("Le fichier sélectionné n'est pas un JSON valide.");
          return;
        }

        const metadata = {
          name: file.name,
          parents: ['appDataFolder']
        };

        const existing = await gapi.client.drive.files.list({
          spaces: 'appDataFolder',
          q: `name='${file.name.replace(/'/g, "\\'")}' and trashed=false`,
          fields: 'files(id, name)'
        });

        const files = existing.result.files || [];

        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', new Blob([JSON.stringify(parsed, null, 2)], { type: 'application/json' }));

        let url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name';
        let method = 'POST';

        if (files.length) {
          url = `https://www.googleapis.com/upload/drive/v3/files/${files[0].id}?uploadType=multipart&fields=id,name`;
          method = 'PATCH';
        }

        const res = await fetch(url, {
          method,
          headers: {
            Authorization: `Bearer ${googleAccessToken}`
          },
          body: form
        });

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const saved = await res.json();
        selectedDriveFileId = saved.id;
        await loadDriveFiles();

        alert(`Fichier local envoyé vers Google Drive : ${saved.name}`);

        console.error(error);

      }

    function money(value) {
      return new Intl.NumberFormat('fr-BE', {
        style: 'currency',
        currency: 'EUR'
      }).format(Number(value || 0));
    }

    function num(value, digits = 2) {
      return Number(value || 0).toFixed(digits);
    }

    function toNumber(value) {
      const n = parseFloat(value);
      return Number.isFinite(n) ? n : 0;
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/`/g, '&#096;');
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    function setField(path, value) {
      const keys = path.split('.');
      let ref = data;
      for (let i = 0; i < keys.length - 1; i++) ref = ref[keys[i]];
      ref[keys[keys.length - 1]] = value;
      saveData(false);
    }

    function lineBase(row) {
      return toNumber(row.qty) * toNumber(row.unitPrice);
    }

    function lineDiscountAmount(row) {
      return lineBase(row) * (toNumber(row.discount) / 100);
    }

    function lineNet(row) {
      return lineBase(row) - lineDiscountAmount(row);
    }

    function lineVat(row) {
      return lineNet(row) * (toNumber(row.vatRate) / 100);
    }

    function lineTvac(row) {
      return lineNet(row) + lineVat(row);
    }

    function totalsFor(docKey) {
      const doc = data[docKey];
      const mainLines = Array.isArray(doc.lines) ? doc.lines : [];
      const suppliesLines = doc.suppliesEnabled && Array.isArray(doc.suppliesLines) ? doc.suppliesLines : [];
      const allLines = [...mainLines, ...suppliesLines];

      const htva = allLines.reduce((sum, row) => sum + lineNet(row), 0);
      const vat = allLines.reduce((sum, row) => sum + lineVat(row), 0);
      const tvac = htva + vat;
      return { htva, vat, tvac };
    }

    function createEmptyLine() {
      return {

        qty: 1,

        unitPrice: 0,

      data[docKey][section].splice(index, 1);

Compte : ${data.company.iban || 'IBAN'}

    function normalizeClientNumber(value) {
      let v = String(value || '').replace(/\D/g, '');

      if (!v) return '';

      // Si déjà sur 3 chiffres → on garde
      if (v.length === 3) return v;

      // Si 1 ou 2 chiffres → on ajoute "1" devant
      if (v.length <= 2) {
        return ('1' + v).slice(0, 3);
      }

      return v.slice(0, 3);
    }

    function normalizeYear(value) {
      return String(value || '').replace(/\D/g, '').slice(0, 4);
    }

    function normalizeInvoiceNumber(value) {
      return String(value || '').replace(/\D/g, '').slice(0, 2);
    }

    function computeStructuredCommunication(clientNumber, invoiceYear, invoiceNumber) {
      const c = normalizeClientNumber(clientNumber);
      const y = normalizeYear(invoiceYear);
      const i = normalizeInvoiceNumber(invoiceNumber);

      if (!c || !y || !i || y.length !== 4) {
        return { base: '', control: '', formatted: '+++...+++' };
      }

      const base = `${c}${y}${i}`;
      const mod = Number(base) % 97;
      const control = mod === 0 ? 97 : mod;
      const controlPadded = String(control).padStart(2, '0');

      return {
        base,
        control: controlPadded,
        formatted: `+++${c}/${y}/${i}${controlPadded}+++`
      };
    }

    function syncCommunicationFromInvoice(shouldRender = true) {
      // On force l'utilisation des données de la facture uniquement
      const clientSource = data.invoice.clientNumber;
      const yearSource = data.invoice.date ? String(data.invoice.date).slice(0, 4) : '';

      const invoiceDigits = String(data.invoice.documentNumber || '').replace(/\D/g, '');
      const invoiceShort = invoiceDigits ? invoiceDigits.slice(-2) : '';

      const result = computeStructuredCommunication(clientSource, yearSource, invoiceShort);

      data.communication.clientNumber = normalizeClientNumber(clientSource);
      data.communication.invoiceYear = normalizeYear(yearSource);
      data.communication.invoiceNumber = normalizeInvoiceNumber(invoiceShort);
      data.communication.controlNumber = result.control;
      data.communication.formatted = result.formatted;

      if (shouldRender) render();
      return result;
    }

          <input type="number" step="0.01" value="${num(data.invoice.paidAmount)}" onchange="data.invoice.paidAmount=parseFloat(this.value)||0; saveData(false)">
        </div>
        <div class="pay-line"><span>Payé</span><strong>${money(paidAmount)}</strong></div>
        <div class="pay-line"><span>Solde</span><strong>${money(balance)}</strong></div>
      </div>
    ` : ``}
  </div>
</div>

          ${renderConditionsPages(docKey, isQuote ? 'DEVIS' : 'FACTURE')}
        </section>
      `;
    }

    function renderQuote() {
      return renderDocumentPage('quote');
    }

    function renderInvoice() {
      syncCommunicationFromInvoice(false);
      return renderDocumentPage('invoice');
    }

    function renderCommunication() {
      const result = syncCommunicationFromInvoice(false);

      return `
        <section class="page ${activePage === 'communication' ? 'active' : ''}" data-page="communication">
          <div class="comm-panel">
            <h2>Communication structurée</h2>
            <div class="footer-note" style="margin-top:0; margin-bottom:16px;">
              Génération simple, dans le même esprit que tes factures.
            </div>

            <div class="comm-grid">
              <div class="field">
                <label>Numéro client</label>
                <input value="${escapeAttr(data.communication.clientNumber)}" onchange="setField('communication.clientNumber', this.value)">
              </div>
              <div class="field">
                <label>Année de facturation</label>
                <input value="${escapeAttr(data.communication.invoiceYear)}" onchange="setField('communication.invoiceYear', this.value)">
              </div>
              <div class="field">
                <label>Numéro de facture</label>
                <input value="${escapeAttr(data.communication.invoiceNumber)}" onchange="setField('communication.invoiceNumber', this.value)">
              </div>
              <div class="inline-actions no-print">
                <button class="primary" style="width:100%;" onclick="copyCommunication()">Copier</button>
              </div>
            </div>

            <div class="comm-result">${escapeHtml(result.formatted)}</div>

            <div class="comm-meta">
              <div class="simple-box"><strong>Base utilisée</strong><br>${escapeHtml(result.base || '—')}</div>
              <div class="simple-box"><strong>Chiffre de contrôle</strong><br>${escapeHtml(result.control || '—')}</div>
              <div class="simple-box"><strong>Rappel</strong><br>Peut reprendre automatiquement les infos de l’onglet Facture.</div>
            </div>
          </div>
        </section>
      `;
    }

    function handleLogoUpload(event) {
      const file = event.target.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        data.company.logo = reader.result;
        saveData(false);
      };
      reader.readAsDataURL(file);
    }

    function removeLogo() {
      data.company.logo = '';
      saveData(false);
    }

    function renderSettings() {
      return `
        <section class="page ${activePage === 'settings' ? 'active' : ''}" data-page="settings">
          <div class="sheet">
            <div class="toolbar no-print">
              <div class="hint">Paramètres société utilisés pour devis et facture</div>
            </div>

            <div class="settings-grid">
              <div class="stack">
                <div class="field">
                  <label>Logo</label>
                  <label class="file-label" style="display:inline-block;">Importer un logo
                    <input type="file" accept="image/*" onchange="handleLogoUpload(event)">
                  </label>
                  ${data.company.logo ? `
                    <div style="margin-top:10px;">
                      <img src="${escapeAttr(data.company.logo)}" alt="Aperçu logo" class="company-logo">
                    </div>
                    <div style="margin-top:8px;">
                      <button type="button" class="danger" onclick="removeLogo()">Supprimer le logo</button>
                    </div>
                  ` : ''}
                </div>

                <div class="field">
                  <label>Nom de la société</label>
                  <input value="${escapeAttr(data.company.name)}" onchange="setField('company.name', this.value)">
                </div>

                <div class="field">
                  <label>Adresse</label>
                  <input value="${escapeAttr(data.company.address)}" onchange="setField('company.address', this.value)">
                </div>

                <div class="field">
                  <label>Code postal / Ville</label>
                  <input value="${escapeAttr(data.company.city)}" onchange="setField('company.city', this.value)">
                </div>

                <div class="field">
                  <label>Téléphone</label>
                  <input value="${escapeAttr(data.company.phone)}" onchange="setField('company.phone', this.value)">
                </div>

                <div class="field">
                  <label>Email</label>
                  <input value="${escapeAttr(data.company.email)}" onchange="setField('company.email', this.value)">
                </div>
              </div>

              <div class="stack">
                <div class="field">
                  <label>Site web</label>
                  <input value="${escapeAttr(data.company.website)}" onchange="setField('company.website', this.value)">
                </div>

                <div class="field">
                  <label>TVA</label>
                  <input value="${escapeAttr(data.company.vat)}" onchange="setField('company.vat', this.value)">
                </div>

                <div class="field">
                  <label>IBAN</label>
                  <input value="${escapeAttr(data.company.iban)}" onchange="setField('company.iban', this.value)">
                </div>

                <div class="field">
                  <label>BIC</label>
                  <input value="${escapeAttr(data.company.bic)}" onchange="setField('company.bic', this.value)">
                </div>

                <div class="field">
                  <label>Conditions</label>
                  <textarea oninput="autoResize(this); data.company.conditions=this.value" onchange="saveData(false)">${escapeHtml(data.company.conditions || '')}</textarea>
                </div>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderPages() {
      const wrap = document.getElementById('pages');
      wrap.innerHTML = `
    ${renderQuote()}
    ${renderInvoice()}
    ${renderCommunication()}
    ${renderPeppol()}
    ${renderGoogleDrive()}
    ${renderSettings()}
  `;
    }

    function render() {
      syncCommunicationFromInvoice(false);
      renderTabs();
      renderPages();

      setTimeout(() => {
        document.querySelectorAll('textarea').forEach(autoResize);
      }, 0);
    }

    window.addEventListener('load', async () => {
      render();
      await initDriveClientOnly();
    });
  </script>
</body>

</html>
